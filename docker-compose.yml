services:
    # --- MySQL Database ---
    mysql:
        image: mysql:8.0
        command: --log-bin-trust-function-creators=1
        ports:
            - "3306:3306"
        environment:
            - MYSQL_DATABASE=progest
            - MYSQL_USER=progest
            - MYSQL_PASSWORD=${DB_PASSWORD:-progest_secret}
            - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_secret}
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - progest-network
        restart: unless-stopped

    # --- Backend Laravel API ---
    progest-api:
        build:
            context: .
            dockerfile: Dockerfile
        image: progest-api:latest
        env_file:
            - ./.env.docker.production
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - progest-network
            - traefik-public
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            # Configuração do Roteamento Seguro Híbrido da API com o próprio App (Sem CORS)
            - "traefik.http.routers.progest-api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
            - "traefik.http.routers.progest-api.entrypoints=websecure"
            - "traefik.http.routers.progest-api.tls=true"
            - "traefik.http.routers.progest-api.tls.certresolver=myresolver"
            # Porta interna onde a API roda (80)
            - "traefik.http.services.progest-api.loadbalancer.server.port=80"

# --- Volumes ---
volumes:
    mysql_data:

        # --- Networks ---
networks:
    progest-network: {}
    traefik-public:
        external: true
        name: traefik-public
